  <body class="antialiased">
    <div id="root"></div>
    <script>
      (function () {
        var RESET_KEY = "smartal-migration-reset-v1";
        try {
          if ("serviceWorker" in navigator && !localStorage.getItem(RESET_KEY)) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              if (!regs.length) {
                localStorage.setItem(RESET_KEY, "1");
                return;
              }
              Promise.all(regs.map(function (r) { return r.unregister(); }))
                .then(function () {
                  return "caches" in window
                    ? caches.keys().then(function (ks) {
                        return Promise.all(ks.map(function (k) { return caches.delete(k); }));
                      })
                    : undefined;
                })
                .then(function () {
                  localStorage.setItem(RESET_KEY, "1");
                  location.reload();
                });
            });
          }
        } catch (e) { /* ignore */ }
      })();

      window.addEventListener("error", function (ev) {
        var tgt = ev && ev.target;
        if (!tgt || (tgt.tagName !== "SCRIPT" && tgt.tagName !== "LINK")) return;
        var RECOVER_KEY = "smartal-recover-v1";
        if (sessionStorage.getItem(RECOVER_KEY)) return;
        sessionStorage.setItem(RECOVER_KEY, "1");
        try {
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              Promise.all(regs.map(function (r) { return r.unregister(); }))
                .then(function () { return "caches" in window ? caches.keys().then(function (ks) { return Promise.all(ks.map(function (k) { return caches.delete(k); })); }) : undefined; })
                .then(function () { location.reload(); });
            });
          } else {
            location.reload();
          }
        } catch (e) { location.reload(); }
      }, true);
    </script>
    <script type="module" src="/src/main.tsx"></script>
